<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1228"/>
      <stop offset="100%" stop-color="#080b16"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b49cff"/>
      <stop offset="50%" stop-color="#7c9cff"/>
      <stop offset="100%" stop-color="#5a7cee"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle star dots -->
  <circle cx="120" cy="100" r="2" fill="#c8d0e8" opacity="0.3"/>
  <circle cx="380" cy="80" r="1.5" fill="#c8d0e8" opacity="0.25"/>
  <circle cx="410" cy="200" r="1.8" fill="#c8d0e8" opacity="0.2"/>
  <circle cx="90" cy="350" r="1.5" fill="#c8d0e8" opacity="0.2"/>
  <circle cx="400" cy="400" r="2" fill="#c8d0e8" opacity="0.15"/>
  <!-- Rising arc — recovery path going upward -->
  <path d="M140 340 Q180 380 220 340 Q260 300 300 310 Q340 320 370 270"
        fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"
        filter="url(#soft)" opacity="0.9"/>
  <!-- Bright point at the peak — where you're heading -->
  <circle cx="370" cy="270" r="12" fill="#7c9cff" filter="url(#soft)"/>
  <circle cx="370" cy="270" r="6" fill="#c8d0e8"/>
  <!-- Small "origin" dot — where you started -->
  <circle cx="140" cy="340" r="5" fill="#7c9cff" opacity="0.4"/>
  <!-- "R" letterform, minimal -->
  <text x="256" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="140" font-weight="200" fill="url(#glow)" letter-spacing="-4" opacity="0.95">r</text>
</svg>
